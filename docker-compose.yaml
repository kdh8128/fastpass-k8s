services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: fastpass-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: fastpass-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fastpass
      POSTGRES_USER: fastpass
      POSTGRES_PASSWORD: fastpass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastpass -d fastpass"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: fastpass-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: